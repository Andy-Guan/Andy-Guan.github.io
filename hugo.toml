baseURL = 'https://andy-guan.github.io/'
title = 'Zero'

# multi-language support
defaultContentLanguage = 'en'

# enable git info
enableGitInfo = true

# disable taxonomy, term and RSS (which removes categories, tags and index.xml)
disableKinds = ["taxonomy", "term", "RSS"]

[module]
  [[module.imports]]
    path = 'github.com/geekifan/zero-academic-page'

[languages]
  [languages.en]
    languageName = 'English'
    weight = 1
    title = 'Zero'

    [languages.en.params]
      author = "Zhijie Guan"
      description = " A sophomore of CIRAM\nat Fudan University"
      motto = "And there’s a million things I haven’t done.\n But just you wait, just you wait..."
    
    [[languages.en.menu.main]]
      name = 'About Me'
      url = '#about-me'
      weight = 1
    [[languages.en.menu.main]]
      name = 'News'
      url = '#news'
      weight = 2
    [[languages.en.menu.main]]
      name = 'Publications'
      url = '#publications'
      weight = 3
    [[languages.en.menu.main]]
      name = 'Honors and Awards'
      url = '#honors-and-awards'
      weight = 4
    [[languages.en.menu.main]]
      name = 'Educations'
      url = '#educations'
      weight = 5
    [[languages.en.menu.main]]
      name = 'Misc'
      url = '#misc'
      weight = 6

      
  [languages.zh]
    languageName = '中文'
    weight = 2
    title = '学术主页'
    
    [languages.zh.params]
      author = "管智杰"
      description = "复旦大学智能科学与技术专业大二本科生"
      motto = "永远年轻，永远热泪盈眶"
    
    [[languages.zh.menu.main]]
      name = '关于我'
      url = '#about-me'
      weight = 1
    [[languages.zh.menu.main]]
      name = '新闻'
      url = '#news'
      weight = 2
    [[languages.zh.menu.main]]
      name = '发表论文'
      url = '#publications'
      weight = 3
    [[languages.zh.menu.main]]
      name = '荣誉与奖项'
      url = '#honors-and-awards'
      weight = 4
    [[languages.zh.menu.main]]
      name = '教育背景'
      url = '#educations'
      weight = 5
    [[languages.zh.menu.main]]
      name = '一些有的没的'
      url = '#misc'
      weight = 6


[params]
  profilePicture = "images/profile.png"
  enableDarkMode = true
  
  [[params.social]]
    name = "github"
    url = "https://github.com/Andy-Guan"
    icon = "fab fa-github"
  [[params.social]]
    name = "google-scholar"
    url = "https://scholar.google.com/"
    icon = "fab fa-google-scholar"
  [[params.social]]
    name = "email"
    url = "mailto:25303070007@m.fudan.edu.cn"
    icon = "fas fa-envelope"
  [[params.social]]
    name = "linkedin"
    url = "https://linkedin.com/"
    icon = "fab fa-linkedin"
  [[params.social]]
    name = "zhihu"
    url = "https://zhihu.com/"
    icon = "fab fa-zhihu"
  [[params.social]]
    name = "xiaohongshu"
    url = "https://www.xiaohongshu.com/explore"
    icon = "fas fa-book-open"

[build]
  writeStats = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
